<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataVault - Secure Storage</title>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#00FF00">
    <link rel="apple-touch-icon" href="/icon-192x192.png">

    <style>
        body {
            background-color: #000;
            color: #00FF00;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            border: 2px solid #00FF00;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 20px #00FF00;
        }
        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        p { color: #888; }
        #install-btn {
            background: #00FF00;
            color: #000;
            border: none;
            padding: 12px 25px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
            display: none; /* Faqat kerak bo'lganda chiqadi */
        }
        #connection-status {
            position: fixed;
            top: 10px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div id="connection-status">Tekshirilmoqda...</div>

    <div class="container">
        <img src="/icon-192x192.png" alt="Logo" style="width: 80px; margin-bottom: 15px;">
        <h1>DataVault</h1>
        <p>Xavfsiz va Oflayn Ma'lumotlar Ombori</p>
        
        <button id="install-btn">ILOVANI O'RNATISH</button>
    </div>

    <div id="update-banner" hidden style="position:fixed; bottom:0; background:#111; width:100%; padding:15px; text-align:center; border-top:1px solid #00FF00;">
        Yangi versiya tayyor! <button id="update-btn" style="background:#00FF00; border:none; padding:5px 15px; border-radius:5px;">Yangilash</button>
    </div>

    <script src="/app.js" defer></script>

</body>
</html>
